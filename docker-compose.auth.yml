services:
  tinyauth:
    image: ghcr.io/steveiliop56/tinyauth
    restart: unless-stopped
    profiles:
      - auth
    environment:
      # TinyAuth config
      - TINYAUTH_APPURL=${TINYAUTH_APP_URL}
      - TINYAUTH_ANALYTICS_ENABLED=false
      - TINYAUTH_UI_TITLE=${TINYAUTH_APP_TITLE:-}
      - TINYAUTH_UI_BACKGROUNDIMAGE=${TINYAUTH_BACKGROUND_IMAGE:-}
      # PocketID OIDC provider
      - TINYAUTH_OAUTH_PROVIDERS_POCKETID_CLIENTID=${OIDC_CLIENT_ID}
      - TINYAUTH_OAUTH_PROVIDERS_POCKETID_CLIENTSECRET=${OIDC_CLIENT_SECRET}
      - TINYAUTH_OAUTH_PROVIDERS_POCKETID_AUTHURL=${OIDC_PROVIDER_URL}/authorize
      - TINYAUTH_OAUTH_PROVIDERS_POCKETID_TOKENURL=${OIDC_PROVIDER_URL}/api/oidc/token
      - TINYAUTH_OAUTH_PROVIDERS_POCKETID_USERINFOURL=${OIDC_PROVIDER_URL}/api/oidc/userinfo
      - TINYAUTH_OAUTH_PROVIDERS_POCKETID_REDIRECTURL=${TINYAUTH_APP_URL}/api/oauth/callback/pocketid
      - TINYAUTH_OAUTH_PROVIDERS_POCKETID_SCOPES=openid email profile groups
      - TINYAUTH_OAUTH_PROVIDERS_POCKETID_NAME=Pocket ID
      - TINYAUTH_OAUTH_AUTOREDIRECT=pocketid
      # Caddy auto-discovery
      - CADDY_DOMAIN=${TINYAUTH_DOMAIN}
      - CADDY_TYPE=${TINYAUTH_TYPE:-external}
      - CADDY_PORT=3000
      - CADDY_TRUSTED_PROXIES=${TINYAUTH_TRUSTED_PROXIES:-}
    networks:
      - caddy

networks:
  caddy:
